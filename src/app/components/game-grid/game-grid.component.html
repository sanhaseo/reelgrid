<div *ngIf="isLoading" class="loading-container">
  <div class="spinner"></div>
</div>

<div *ngIf="!isLoading" class="game-container">
  <div class="status-bar">
    <div class="lives">Lives: {{ lives }}</div>
    <button (click)="onGiveUp()" [disabled]="gameOver" class="action-btn">Give Up</button>
    <button (click)="onRegenerate()" [disabled]="isRegenerating" class="action-btn">
      {{ isRegenerating ? 'Regenerating...' : 'Regenerate Daily Board' }}
    </button>
    <div class="message" *ngIf="message">{{ message }}</div>
  </div>

  <div class="grid-wrapper">
    <!-- Top Left Corner (Empty) -->
    <div class="header-cell corner"></div>

    <!-- Column Headers -->
    <div class="header-cell col-header clickable-header" *ngFor="let col of colCriteria"
      (click)="openCriteriaInfo(col)">
      <div class="criteria-label">{{ col.label }}</div>
      <div class="criteria-type">{{ col.type }}</div>
    </div>

    <!-- Rows -->
    <ng-container *ngFor="let row of rowCriteria; let i = index">
      <!-- Row Header -->
      <div class="header-cell row-header clickable-header" (click)="openCriteriaInfo(row)">
        <div class="criteria-label">{{ row.label }}</div>
        <div class="criteria-type">{{ row.type }}</div>
      </div>

      <!-- Grid Cells -->
      <div *ngFor="let cell of grid[i]; let j = index" (click)="onCellClick(i, j)" class="cell-wrapper">
        <app-grid-cell [movie]="cell" [rarity]="gridRarity[i][j]"
          [isIncorrect]="incorrectCell?.row === i && incorrectCell?.col === j">
        </app-grid-cell>
      </div>
    </ng-container>
  </div>
</div>

<div #summarySection>
  <app-game-summary *ngIf="summaryAnswers" [summaryAnswers]="summaryAnswers" [summaryStats]="summaryStats"
    [userGrid]="grid">
  </app-game-summary>
</div>

<app-search *ngIf="isSearchOpen" [usedMovieIds]="getUsedMovieIds()" (movieSelected)="onMovieSelected($event)"
  (close)="closeSearch()">
</app-search>

<div class="modal-overlay" *ngIf="showCriteriaModal" (click)="closeCriteriaModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ selectedCriteria?.label }}</h2>
      <button class="close-btn" (click)="closeCriteriaModal()">&times;</button>
    </div>
    <div class="modal-body">
      <img *ngIf="selectedCriteria?.image" [src]="selectedCriteria?.image" [alt]="selectedCriteria?.label"
        class="criteria-image">
      <p>{{ selectedCriteria ? getCriteriaDescription(selectedCriteria) : '' }}</p>
    </div>
  </div>
</div>
