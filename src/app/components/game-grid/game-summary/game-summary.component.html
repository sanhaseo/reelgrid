<div class="summary-section">
    <h2>Game Summary</h2>

    <!-- Tabs -->
    <div class="summary-tabs">
        <button class="tab-btn" [class.active]="activeSummaryTab === 'stats'" (click)="setActiveTab('stats')">
            Statistics
        </button>
        <button class="tab-btn" [class.active]="activeSummaryTab === 'answers'" (click)="setActiveTab('answers')">
            Answers
        </button>
    </div>

    <!-- STATS VIEW -->
    <div class="summary-content" *ngIf="activeSummaryTab === 'stats'">
        <div class="stat-controls">
            <label>View Board:</label>
            <select #statSelect (change)="setStatView(statSelect.value === 'popular' ? 'popular' : 'rare')">
                <option value="popular" [selected]="activeStatView === 'popular'">Most Popular Answers</option>
                <option value="rare" [selected]="activeStatView === 'rare'">Rare Finds</option>
            </select>
        </div>

        <app-summary-board *ngIf="activeStatView === 'popular'" [gridData]="getPopularGrid()"
            title="Most Popular Choices" [rowCriteria]="rowCriteria" [colCriteria]="colCriteria">
        </app-summary-board>

        <app-summary-board *ngIf="activeStatView === 'rare'" [gridData]="getRareGrid()" title="Rarest Valid Answers"
            [rowCriteria]="rowCriteria" [colCriteria]="colCriteria">
        </app-summary-board>
    </div>

    <!-- ANSWERS VIEW (Existing List) -->
    <div class="summary-grid" *ngIf="activeSummaryTab === 'answers'">
        <div class="summary-row" *ngFor="let row of summaryAnswers; let i = index">
            <div class="summary-cell clickable-cell" *ngFor="let movies of row; let j = index"
                (click)="openAnswersModal(movies)">
                <div class="show-answers-text">
                    Show Answers <span class="count">({{ movies.length }})</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Answers Modal -->
    <div class="modal-overlay" *ngIf="showModal" (click)="closeAnswersModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">
            <div class="modal-header">
                <h2>Top Possible Answers ({{ selectedAnswers?.length }})</h2>
                <button class="close-btn" (click)="closeAnswersModal()">&times;</button>
            </div>
            <div class="modal-body scrollable-unique">
                <div class="answers-list-container">
                    <div *ngFor="let m of selectedAnswers" class="answer-item">
                        <img *ngIf="m.poster_path" [src]="m.poster_path" class="answer-thumb">
                        <div *ngIf="!m.poster_path" class="answer-thumb placeholder"></div>
                        <div class="answer-info">
                            <div class="answer-title">{{ m.title }}</div>
                            <div class="answer-year">{{ m.release_date | date:'yyyy' }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
