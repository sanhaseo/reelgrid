<div class="summary-section">
    <h2>Game Summary</h2>

    <!-- Tabs -->
    <div class="summary-tabs">
        <button class="tab-btn" [class.active]="activeSummaryTab === 'results'" (click)="setActiveTab('results')">
            Results
        </button>
        <button class="tab-btn" [class.active]="activeSummaryTab === 'stats'" (click)="setActiveTab('stats')">
            Stats & Answers
        </button>
    </div>

    <!-- RESULTS VIEW (Placeholder) -->
    <div class="summary-content" *ngIf="activeSummaryTab === 'results'">
        <div style="text-align: center; padding: 2rem; color: #888;">
            <p>Results will be displayed here.</p>
        </div>
    </div>

    <!-- STATS & ANSWERS VIEW -->
    <div class="summary-content" *ngIf="activeSummaryTab === 'stats'">
        <div class="stat-controls">
            <label>View Board:</label>
            <select #statSelect (change)="setStatView($any(statSelect.value))">
                <option value="popular" [selected]="activeStatView === 'popular'">Most Popular Answers</option>
                <option value="rare" [selected]="activeStatView === 'rare'">Least Popular Answers</option>
                <option value="answers" [selected]="activeStatView === 'answers'">Possible Answers</option>
            </select>
        </div>

        <app-summary-board *ngIf="activeStatView === 'popular'" [gridData]="getPopularGrid()"
            [rowCriteria]="rowCriteria" [colCriteria]="colCriteria">
        </app-summary-board>

        <app-summary-board *ngIf="activeStatView === 'rare'" [gridData]="getRareGrid()" [rowCriteria]="rowCriteria"
            [colCriteria]="colCriteria">
        </app-summary-board>

        <app-summary-board *ngIf="activeStatView === 'answers'" [gridData]="summaryAnswers || []"
            [rowCriteria]="rowCriteria" [colCriteria]="colCriteria" [customCellTemplate]="answersCell">
        </app-summary-board>

        <ng-template #answersCell let-movies>
            <div class="summary-cell clickable-cell" (click)="openAnswersModal(movies)">
                <div class="show-answers-text">
                    Show Answers <span class="count">({{ movies?.length || 0 }})</span>
                </div>
            </div>
        </ng-template>
    </div>

    <!-- Answers Modal -->
    <app-answers-modal *ngIf="showModal" [answers]="selectedAnswers" (close)="closeAnswersModal()"></app-answers-modal>
</div>
