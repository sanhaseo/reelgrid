<div class="game-container">
  <header class="app-header">
    <h1 class="logo">Cine<span class="red">Grid</span></h1>
    <div class="header-actions">
      <button class="archive-btn icon-btn" (click)="openArchiveModal()" title="Play Archive" aria-label="Play Archive">
        <span class="material-icons">calendar_month</span>
      </button>
      <button class="about-btn icon-btn" (click)="openAboutModal()" title="About CineGrid" aria-label="About CineGrid">
        <span class="material-icons">help_outline</span>
      </button>
    </div>
  </header>

  <div *ngIf="isLoading" class="loading-container">
    <div class="spinner"></div>
  </div>

  <ng-container *ngIf="!isLoading">
    <div class="game-content-row">
      <app-board [rowCriteria]="rowCriteria" [colCriteria]="colCriteria" [gridData]="grid"
        [cellTemplate]="gameCellTemplate" (criteriaClick)="openCriteriaInfo($event)"
        (cellClick)="onCellClick($event.row, $event.col)">
      </app-board>

      <ng-template #gameCellTemplate let-cell let-i="row" let-j="col">
        <app-grid-cell [movie]="cell" [rarity]="gridRarity[i][j]"
          [isIncorrect]="incorrectCell?.row === i && incorrectCell?.col === j"
          [isSelected]="selectedCell?.row === i && selectedCell?.col === j">
        </app-grid-cell>
      </ng-template>

      <!-- Side Panel -->
      <div class="side-panel">
        <app-game-status [guessesLeft]="guessesLeft" [gameOver]="gameOver" [isRegenerating]="isRegenerating"
          [boardDate]="boardDate" (giveUp)="onGiveUp()" (regenerate)="onRegenerate()">
        </app-game-status>
      </div>
    </div>

    <!-- Game Summary Details (Rendered below grid when game over) -->
    <div class="game-summary-container" *ngIf="gameOver" #summarySection>
      <app-game-summary [totalCompletedGames]="totalCompletedGames" [summaryStats]="summaryStats" [userGrid]="grid"
        [rowCriteria]="rowCriteria" [colCriteria]="colCriteria"></app-game-summary>
    </div>
  </ng-container>

  <footer>
    <div class="attribution">
      Movie data provided by <a href="https://www.themoviedb.org" target="_blank" rel="noopener noreferrer"><img
          src="assets/tmdb_logo.svg" alt="TMDB Logo" class="tmdb-logo"></a>
    </div>
  </footer>
</div>

<app-search *ngIf="isSearchOpen" [usedMovieIds]="getUsedMovieIds()" (movieSelected)="onMovieSelected($event)"
  (close)="closeSearch()">
</app-search>

<div class="modal-overlay" *ngIf="showCriteriaModal" (click)="closeCriteriaModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ selectedCriteria?.label }}</h2>
      <button class="close-btn" (click)="closeCriteriaModal()">&times;</button>
    </div>
    <div class="modal-body">
      <img *ngIf="selectedCriteria?.image" [src]="selectedCriteria?.image" [alt]="selectedCriteria?.label"
        class="criteria-image">
      <p>{{ selectedCriteria ? getCriteriaDescription(selectedCriteria) : '' }}</p>
    </div>
  </div>
</div>

<app-archive-modal [show]="showArchiveModal" [archiveDates]="archiveDates" [activeBoardDate]="activeBoardDate"
  (close)="closeArchiveModal()" (dateSelected)="loadBoard($event)">
</app-archive-modal>

<app-about-modal [show]="showAboutModal" (close)="closeAboutModal()"></app-about-modal>
