<div class="status-container">
    <div class="board-info">
        <div class="board-number">{{ boardDate }}</div>
    </div>

    <div class="status-stats">
        <div class="stat-box">
            <span class="stat-value">{{ guessesLeft }}</span>
            <span class="stat-label">Guesses Left</span>
        </div>
    </div>

    <div class="status-actions">
        <button (click)="onGiveUp()" [disabled]="gameOver || guessesLeft === 10" class="action-btn">
            Give Up
        </button>
        <button *ngIf="isDevelopment" (click)="onRegenerate()" [disabled]="isRegenerating" class="action-btn">
            {{ isRegenerating ? 'Regenerating...' : 'Regenerate Daily Board' }}
        </button>
    </div>
</div>

<!-- Give Up Confirmation Modal -->
<div class="modal-overlay" *ngIf="showConfirmModal" (click)="cancelGiveUp()">
    <div class="modal-content" (click)="$event.stopPropagation()">
        <h2>Give Up?</h2>
        <p>Are you sure you want to give up and see the answers?</p>
        <div class="modal-actions">
            <button class="action-btn danger" (click)="confirmGiveUp()">Yes, Give Up</button>
            <button class="action-btn secondary" (click)="cancelGiveUp()">Cancel</button>
        </div>
    </div>
</div>
