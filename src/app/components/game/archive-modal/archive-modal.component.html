<div class="modal-overlay" *ngIf="show" (click)="onClose()">
    <div class="modal-content archive-modal" (click)="$event.stopPropagation()">
        <div class="modal-header">
            <h2>Archived Boards</h2>
            <button class="close-btn" (click)="onClose()">&times;</button>
        </div>
        <div class="modal-body">

            <div class="calendar-controls">
                <button class="nav-btn" (click)="previousMonth()">&lt;</button>
                <h3>{{ currentMonthStr }}</h3>
                <button class="nav-btn" (click)="nextMonth()">&gt;</button>
            </div>

            <div class="calendar-header">
                <div class="weekday" *ngFor="let d of weekdays">{{ d }}</div>
            </div>

            <div class="calendar-grid">
                <div *ngFor="let day of calendarDays" class="calendar-day" [class.padding]="day.isPadding"
                    [class.unavailable]="!day.isAvailable && !day.isPadding" [class.available]="day.isAvailable"
                    [class.active-date]="day.dateStr === activeBoardDate" (click)="onDateSelect(day)"
                    [title]="day.status === 'in-progress' ? 'In-Progress (' + day.score + '/9)' : (day.status === 'finished' ? 'Finished (' + day.score + '/9)' : '')">

                    <span class="day-num" *ngIf="!day.isPadding">{{ day.dayNum }}</span>

                    <div class="day-progress" *ngIf="day.status">
                        <span *ngIf="day.status === 'in-progress'" class="in-progress">
                            <span class="status-dot"></span>
                            <span class="status-text">⏳ {{ day.score }}/9</span>
                        </span>
                        <span *ngIf="day.status === 'finished'" class="finished">
                            <span class="status-dot"></span>
                            <span class="status-text">✓ {{ day.score }}/9</span>
                        </span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
